<!DOCTYPE html>
<html lang="pt">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Brilho Certo - Despesas</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="despesas.css">

</head>

<script>

const perfil =
localStorage.getItem("perfil");

if(perfil === "funcionario"){

alert(
"Acesso não autorizado."
);

window.location.href =
"agendamentos.html";

}

</script>

<body>

<div class="sidebar">

<h3>🚗 Brilho Certo</h3>
<!--
<button
class="menu-btn"
onclick="location.href='dashboard.html'">
🏠 Início
</button>
-->
<button
class="menu-btn"
onclick="location.href='agendamentos.html'">
📅 Agenda
</button>

<button
class="menu-btn"
onclick="location.href='pagamentos.html'">
💳 Pagamentos
</button>

<button
class="menu-btn ativo menu-restrito">
💸 Despesas
</button>

<button
class="menu-btn menu-restrito"
onclick="location.href='relatorios.html'">
📊 Relatórios
</button>

<button
class="menu-btn"
onclick="logout()">
🚪 Sair
</button>

</div>

<div class="content">

<h2>💸 Controle de Despesas</h2>

<div class="row mb-4">

<div class="col-md-4">

<div class="card-dashboard">

<div>Despesas Hoje</div>

<div
class="numero text-danger"
id="despesasHoje">

€ 0,00

</div>

</div>

</div>

<div class="col-md-4">

<div class="card-dashboard">

<div>Despesas Mês</div>

<div
class="numero text-warning"
id="despesasMes">

€ 0,00

</div>

</div>

</div>

<div class="col-md-4">

<div class="card-dashboard">

<div>Saldo do Mês</div>

<div
class="numero text-success"
id="saldoMes">

€ 0,00

</div>

</div>

</div>

</div>

<div class="row">

<div class="col-lg-4">

<div class="card-dashboard">

<h5>Nova Despesa</h5>

<form id="formDespesa">

<label class="form-label">
Origem
</label>

<select
id="origem"
class="form-control mb-3"
required>

<option value="">
Selecione
</option>

<option>
Caixa Brilho Certo
</option>

<option>
Caixa IMO Wash Car
</option>

</select>

<label class="form-label">
Categoria
</label>

<select
id="categoria"
class="form-control mb-3"
required>

<option value="">
Selecione
</option>

<option>
Ordenados
</option>

<option>
Comissões
</option>

<option>
Despesas Operacionais
</option>

<option>
Alimentação
</option>

<option>
Contas
</option>

<option>
Despesas Pessoais
</option>

<option>
Ordenado Diário
</option>

<option>
Combustível
</option>

<option>
Oficina Mecânica
</option>

<option>
Outros
</option>

</select>

<label class="form-label">
Subcategoria
</label>

<select
id="subcategoria"
class="form-control mb-3"
required>

<option value="">
Selecione
</option>

</select>
<label class="form-label">
Data da Despesa
</label>

<input
type="date"
id="dataDespesa"
class="form-control mb-3"
required>
  
<label class="form-label">
Valor (€)
</label>

<input
type="number"
step="0.01"
id="valor"
class="form-control mb-3"
required>

<label class="form-label">
Observações
</label>

<textarea
id="observacoes"
class="form-control mb-3"
rows="3"></textarea>

<button
type="submit"
class="btn btn-primary w-100">

Salvar Despesa

</button>

</form>

</div>

</div>

<div class="col-lg-8">

<div class="card-dashboard">

<h5>Filtros</h5>

<div class="row">

<div class="col-md-3">

<input
type="date"
id="filtroInicio"
class="form-control">

</div>

<div class="col-md-3">

<input
type="date"
id="filtroFim"
class="form-control">

</div>

<div class="col-md-3">

<select
id="filtroCategoria"
class="form-control">

<option value="">
Todas Categorias
</option>

</select>

</div>

<div class="col-md-3">

<select
id="filtroOrigem"
class="form-control">

<option value="">
Todas Origens
</option>

<option>
Caixa Brilho Certo
</option>

<option>
Caixa IMO Wash Car
</option>

</select>

</div>

</div>

<button
class="btn btn-secondary mt-3"
onclick="filtrarDespesas()">

Pesquisar

</button>

</div>

<div class="card-dashboard">

<h5>Histórico de Despesas</h5>

<div class="table-responsive">

<table class="table table-striped">

<thead>

<tr>

<th>Data</th>
<th>Origem</th>
<th>Categoria</th>
<th>Subcategoria</th>
<th>Valor</th>
<th>Observações</th>
<th>Ações</th>
</tr>

</thead>

<tbody id="tabelaDespesas">

</tbody>

</table>

</div>

</div>

</div>

</div>

</div>

<script src="seguranca.js"></script>  
<script src="despesas.js"></script>

<script>
aplicarPermissoesMenu();
</script>

</body>

</html>
