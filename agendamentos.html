<!DOCTYPE html>
<html lang="pt">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Brilho Certo - Lavagem de Carros</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css" rel="stylesheet">

<style>

body{
background:#eef3f8;
font-family:Arial, sans-serif;
margin:0;
}

/* MENU */

.sidebar{
position:fixed;
left:0;
top:0;
width:260px;
height:100vh;
background:#0d6efd;
padding:20px;
color:white;
overflow:auto;
}

.sidebar h3{
font-weight:bold;
margin-bottom:25px;
}

.menu-btn{
width:100%;
margin-bottom:10px;
border:none;
padding:12px;
border-radius:8px;
background:white;
color:#0d6efd;
font-weight:bold;
cursor:pointer;
}

/* CONTEÚDO */

.content{
margin-left:280px;
padding:20px;
}

/* CARDS */

.card-custom{
background:white;
border-radius:15px;
padding:20px;
box-shadow:0 2px 15px rgba(0,0,0,0.10);
margin-bottom:20px;
}

/* CALENDÁRIO */

#calendar{
background:white;
padding:10px;
border-radius:15px;
}

/* FORM */

.form-label{
font-weight:bold;
}

.servico-item{
display:flex;
justify-content:space-between;
align-items:center;
padding:8px;
margin-bottom:5px;
background:#f7f7f7;
border-radius:8px;
}

#btnAtualizar{
display:none;
}

#listaDia{
max-height:300px;
overflow:auto;
}

.agendamento-item{
padding:10px;
border-bottom:1px solid #ddd;
cursor:pointer;
}

.agendamento-item:hover{
background:#f0f7ff;
}

.fc-daygrid-day.fc-day-selecionado{
background:#d8e9ff !important;
}

@media (max-width: 768px){

.sidebar{
position:relative;
width:100%;
height:auto;
display:block;
padding:10px;
}

.menu-btn{
margin-bottom:5px;
font-size:14px;
}

.content{
margin-left:0;
padding:10px;
}

#calendar{
height:auto !important;
}

.card-custom{
padding:12px;
}
 
.fc .fc-toolbar{
    display:flex !important;
    flex-direction:column !important;
    gap:10px;
}

.fc .fc-toolbar-chunk{
    text-align:center;
}

.fc .fc-toolbar-title{
    font-size:28px !important;
    text-align:center;
}
 .fc-view-harness{
    min-height:600px !important;
}

.fc-scrollgrid{
    min-height:500px !important;
}

#calendar{
    min-height:650px !important;
}
} 
</style>

</head>

<body>
<div class="sidebar">
<h3>🚗 Brilho Certo</h3>
<!--
<button
class="menu-btn"
onclick="confirmarSaida('dashboard.html')">
🏠 Início
</button>
-->
<button class="menu-btn">
📅 Agenda
</button>

<button class="menu-btn"
onclick="confirmarSaida('pagamentos.html')">
💳 Pagamentos
</button>

<button
id="menuDespesas"
class="menu-btn"
onclick="confirmarSaida('despesas.html')">
💸 Despesas
</button>

<button
id="menuRelatorios"
class="menu-btn"
onclick="confirmarSaida('relatorios.html')">
📊 Relatórios
</button>

<button
class="menu-btn"
onclick="logout()">
🚪 Sair
</button>

</div>

<div class="content">

<div class="row">

<div class="col-lg-8">

<div class="card-custom">

<div id="calendar"></div>

</div>

</div>

<div class="col-lg-4">

<div class="card-custom">

<h4>Novo Agendamento</h4>

<form id="formAgendamento">

<label class="form-label">
Nome do Cliente
</label>

<input
type="text"
id="cliente"
class="form-control mb-3"
required>

<label class="form-label">
Telefone
</label>

<input
type="text"
id="telefone"
class="form-control mb-3"
required>

<label class="form-label">
Modelo do Carro
</label>

<input
type="text"
id="modelo"
class="form-control mb-3"
required>

<label class="form-label">
Data do Agendamento
</label>

<input
type="date"
id="data"
class="form-control mb-3"
required>

<label class="form-label">
Hora do Agendamento
</label>

<select
id="hora"
class="form-control mb-3"
required>
</select>

<label class="form-label">
Serviços
</label>

<div class="servico-item">
<label>
<input type="checkbox" value="Aspiração interior e exterior">
 Aspiração interior e exterior
</label>
</div>

<div class="servico-item">
<label>
<input type="checkbox" value="Estofos sem teto">
 Estofos sem teto
</label>
</div>

<div class="servico-item">
<label>
<input type="checkbox" value="Estofos com teto">
 Estofos com teto
</label>
</div>

<div class="servico-item">
<label>
<input type="checkbox" value="Faróis">
 Faróis
</label>
</div>

<div class="servico-item">
<label>
<input type="checkbox" value="Polimento">
 Polimento
</label>
</div>

<div class="servico-item">
<label>
<input type="checkbox" value="Lavagem dos bancos">
 Lavagem dos bancos
</label>
</div>

<label class="form-label mt-3">
Valor Total (€)
</label>

<input
type="number"
id="valor"
step="0.01"
min="0"
class="form-control mb-3">

<label class="form-label">
Observações
</label>

<textarea
id="observacoes"
class="form-control mb-3"
rows="3"></textarea>

<button
type="submit"
class="btn btn-primary w-100"
id="btnSalvar">

Salvar Agendamento

</button>

<button
type="button"
class="btn btn-warning w-100 mt-2"
id="btnAtualizar">

Salvar Alterações

</button>

<button
type="button"
class="btn btn-danger w-100 mt-2"
onclick="excluirAgendamento()">

Apagar Agendamento

</button>


</form>

</div>

<div class="card-custom">

<h5>
Agendamentos do Dia
</h5>

<div id="listaDia">

Selecione um dia no calendário.

</div>

</div>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
<script>

const perfil = localStorage.getItem("perfil");

if (!perfil) {
  window.location.href = "login.html";
}

</script>
<script type="module" src="agendamentos.js"></script>
</body>
</html>
