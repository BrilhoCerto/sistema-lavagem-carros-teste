<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Brilho Certo</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body {
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#0f172a;
font-family:Arial;
}

.card {
background:#1e293b;
padding:30px;
border-radius:15px;
width:350px;
color:white;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

input {
width:100%;
margin-bottom:15px;
padding:10px;
border-radius:8px;
border:none;
outline:none;
}

button {
width:100%;
padding:10px;
border:none;
border-radius:8px;
background:#2563eb;
color:white;
font-weight:bold;
}

button:hover {
background:#1d4ed8;
}

.small {
font-size:12px;
opacity:0.7;
margin-top:10px;
text-align:center;
}

</style>
</head>

<body>

<div class="card">

<h3 style="text-align:center;">Acesso Restrito</h3>

<input type="text" id="user" placeholder="Usuário">
<input type="password" id="pass" placeholder="Senha">

<button onclick="login()">Entrar</button>

<div class="small">
Somente colaboradores autorizados
</div>

</div>

<script>

function login(){

const user =
document.getElementById("user").value;

const pass =
document.getElementById("pass").value;

/* GESTOR */

if(
user === "eliane"
&&
pass === "123"
){

localStorage.setItem(
"perfil",
"gestor"
);

localStorage.setItem(
"utilizador",
"Eliane"
);

location.href =
"agendamentos.html";

return;

}

/* ADMINISTRADOR */

if(
user === "samuel"
&&
pass === "123"
){

localStorage.setItem(
"perfil",
"administrador"
);

localStorage.setItem(
"utilizador",
"Samuel"
);

location.href =
"agendamentos.html";

return;

}

/* FUNCIONÁRIO */

if(
user === "funcionario"
&&
pass === "123"
){

localStorage.setItem(
"perfil",
"funcionario"
);

localStorage.setItem(
"utilizador",
"Funcionário"
);

location.href =
"agendamentos.html";

return;

}

alert(
"Credenciais inválidas"
);

}

</script>

</body>
</html>
