<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brilho Certo - Sistema Interno</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body {
margin:0;
height:100vh;
font-family:Arial;
background:url("https://images.unsplash.com/photo-1600661653561-629509216228?auto=format&fit=crop&w=1600&q=80") center/cover no-repeat;
}

.overlay {
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.65);
}

.portal {
position:relative;
z-index:2;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
color:white;
flex-direction:column;
padding:20px;
}

.title {
font-size:40px;
font-weight:bold;
}

.subtitle {
font-size:18px;
opacity:0.85;
margin-bottom:30px;
}

.btn-main {
padding:12px 30px;
font-size:18px;
border:none;
border-radius:10px;
background:#0d6efd;
color:white;
font-weight:bold;
cursor:pointer;
}

.btn-main:hover {
background:#0b5ed7;
}

.small {
margin-top:20px;
font-size:12px;
opacity:0.7;
}

</style>
</head>

<body>

<div class="overlay"></div>

<div class="portal">

<div class="title">BRILHO CERTO</div>

<div class="subtitle">
Sistema Interno de Gestão de Agendamentos<br>
Aspiração e Lavagem de Veículos
</div>

<button class="btn-main" onclick="location.href='login.html'">
Acessar Sistema
</button>

<div class="small">
Acesso restrito a colaboradores autorizados
</div>

</div>

</body>
</html>
